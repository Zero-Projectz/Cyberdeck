
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runner Link // Marathon</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js"></script>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>

    <style>
        :root { 
            --bg-color: #000000; 
            --accent-color: #fbff00; /* Marathon Yellow */
            --text-color: #ffffff; 
            --border-color: rgba(255, 255, 255, 0.1);
            --glow: 0 0 15px rgba(251, 255, 0, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: var(--bg-color);
            position: fixed; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            padding-top: env(safe-area-inset-top);
        }

        /* Scanline effect voor die echte Marathon vibe */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        header { 
            padding: 15px 20px; 
            border-bottom: 2px solid var(--accent-color); 
            display: flex; justify-content: space-between; align-items: center;
            background: #000;
            box-shadow: var(--glow);
            z-index: 10;
        }

        header strong { 
            text-transform: uppercase; 
            font-weight: 900; 
            font-style: italic; 
            letter-spacing: 2px;
            color: var(--accent-color); 
        }

        .theme-selector {
            display: flex; gap: 12px; padding: 12px 20px; 
            background: rgba(255,255,255,0.03); 
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .swatch {
            min-width: 24px; height: 24px; border-radius: 4px; 
            border: 1px solid #fff; cursor: pointer;
            transition: transform 0.2s;
        }
        .swatch:active { transform: scale(0.9); }

        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            -webkit-overflow-scrolling: touch;
        }

        .bubble { 
            max-width: 85%; padding: 14px; border-radius: 2px; 
            font-size: 15px; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-color);
            line-height: 1.5;
        }

        .user { 
            align-self: flex-end; 
            border: 1px solid var(--accent-color); 
            color: var(--accent-color);
            background: rgba(0,0,0,0.5);
            box-shadow: inset 0 0 10px rgba(var(--accent-color), 0.1);
        }

        .ai { 
            align-self: flex-start; 
            border-left: 4px solid var(--accent-color); 
        }

        .input-area { 
            padding: 15px; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex; gap: 10px; background: #000; 
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #user-input { 
            flex: 1; padding: 12px; border-radius: 0; 
            border: 1px solid var(--border-color);
            background: #0a0a0a; color: #fff; font-size: 16px; 
            outline: none;
        }
        #user-input:focus { border-color: var(--accent-color); }

        button { 
            background: var(--accent-color); color: #000; 
            border: none; padding: 0 20px; font-weight: 900; 
            text-transform: uppercase; font-style: italic;
        }

        #status { 
            font-size: 9px; padding: 4px 20px; 
            background: var(--accent-color); color: #000; 
            font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
