

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runner Link // Marathon</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js"></script>

    <style>
        :root { 
            --bg-color: #000000; 
            --accent-color: #fbff00; 
            --text-color: #ffffff; 
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            overflow: hidden; background-color: #000;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: var(--text-color); display: flex; flex-direction: column; 
            padding-top: env(safe-area-inset-top);
        }

        header { 
            padding: 15px 20px; border-bottom: 2px solid var(--accent-color); 
            display: flex; justify-content: space-between; align-items: center;
            background: #000; flex-shrink: 0;
        }

        header strong { text-transform: uppercase; font-weight: 900; font-style: italic; color: var(--accent-color); letter-spacing: 1px; }

        #chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
            background: linear-gradient(180deg, #000 0%, #111 100%);
        }

        .bubble { 
            max-width: 85%; padding: 12px; border-radius: 2px; font-size: 15px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
        }

        .ai { border-left: 4px solid var(--accent-color); }
        .user { align-self: flex-end; border: 1px solid var(--accent-color); color: var(--accent-color); }

        .input-area { 
            padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex; gap: 10px; background: #000; border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        #user-input { 
            flex: 1; padding: 12px; background: #0a0a0a; border: 1px solid var(--border-color);
            color: #fff; font-size: 16px; outline: none;
        }

        button { background: var(--accent-color); color: #000; border: none; padding: 0 20px; font-weight: 900; text-transform: uppercase; }

        #status { font-size: 10px; padding: 5px 20px; background: var(--accent-color); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <strong>Runner_Link // Ext_01</strong>
    <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; font-size:10px; padding:2px 5px;">RELOAD</button>
</header>

<div id="status">STATUS: SYSTEM_READY</div>

<div id="chat-container">
    <div class="bubble ai">UPLINK_SUCCESS. <br><br>Let op: Als je een hardware error krijgt, gebruik dan Safari (iOS) of Chrome (Android). Brave blokkeert vaak de neurale link (WebGPU).</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
    <button onclick="sendMessage()">Push</button>
</div>

<script>
    let history = [{role:"system", content:"Je bent een Marathon Runner AI."}];
    let engine;

    function append(role, text) {
        const d = document.createElement('div');
        d.className = `bubble ${role}`;
        d.innerHTML = text;
        document.getElementById('chat-container').appendChild(d);
        document.getElementById('chat-container').scrollTop = 999999;
        return d;
    }

    async function sendMessage() {
        const i = document.getElementById('user-input');
        const val = i.value.trim();
        if(!val) return;
        append('user', val);
        i.value = '';

        if (!navigator.gpu) {
            append('ai', "❌ FATAL_ERROR: WebGPU niet gedetecteerd. <br><br>1. Gebruik Safari.<br>2. Zet 'Energiebesparingsmodus' UIT.");
            return;
        }

        try {
            if(!engine) {
                document.getElementById('status').innerText = "STATUS: MOUNTING_MODEL...";
                engine = new webllm.MLCEngine();
                await engine.reload("SmolLM-135B-Instruct-v0.2-q4f16_1-MLC");
            }
            document.getElementById('status').innerText = "STATUS: THINKING...";
            const b = append('ai', '...');
            let full = "";
            const res = await engine.chat.completions.create({ messages: history, stream: true });
            for await (const chunk of res) {
                full += chunk.choices[0]?.delta?.content || "";
                b.innerText = full;
            }
            document.getElementById('status').innerText = "STATUS: ONLINE";
        } catch (e) {
            append('ai', "❌ HARDWARE_ERROR: " + e.message);
        }
    }
</script>
</body>
</html>
