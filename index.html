

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Runner Link // Marathon</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js" onerror="alert('CDN Link Broken!')"></script>

    <style>
        :root { --bg-color: #000; --accent-color: #fbff00; --text-color: #fff; --border-color: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; position: fixed; }
        body { font-family: -apple-system, sans-serif; color: var(--text-color); display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        header { padding: 15px 20px; border-bottom: 2px solid var(--accent-color); display: flex; justify-content: space-between; align-items: center; background: #000; flex-shrink: 0; }
        header strong { text-transform: uppercase; font-weight: 900; font-style: italic; color: var(--accent-color); letter-spacing: 1px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #000; }
        .bubble { max-width: 85%; padding: 12px; border-radius: 2px; font-size: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); line-height: 1.4; }
        .ai { border-left: 4px solid var(--accent-color); }
        .user { align-self: flex-end; border: 1px solid var(--accent-color); color: var(--accent-color); }
        .input-area { padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 10px; background: #000; border-top: 1px solid var(--border-color); flex-shrink: 0; }
        #user-input { flex: 1; padding: 12px; background: #0a0a0a; border: 1px solid var(--border-color); color: #fff; font-size: 16px; outline: none; border-radius: 0; }
        button { background: var(--accent-color); color: #000; border: none; padding: 0 20px; font-weight: 900; text-transform: uppercase; font-style: italic; }
        #status { font-size: 10px; padding: 5px 20px; background: var(--accent-color); color: #000; font-weight: bold; height: 24px; display: flex; align-items: center; }
    </style>
</head>
<body>

<header>
    <strong>Runner_Link // Ext_01</strong>
    <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; font-size:9px; padding:2px 5px;">REFRESH</button>
</header>

<div id="status">STATUS: INITIALIZING_UPLINK...</div>

<div id="chat-container">
    <div class="bubble ai">UPLINK_SUCCESS. <br><br>Wacht tot de status 'READY' aangeeft voordat je een bericht stuurt.</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Wachten op systeem..." disabled>
    <button id="send-btn" onclick="sendMessage()" disabled>Push</button>
</div>

<script>
    let engine;
    const statusEl = document.getElementById('status');
    const inputEl = document.getElementById('user-input');
    const btnEl = document.getElementById('send-btn');

    // Check of de library geladen is
    window.onload = () => {
        if (typeof webllm !== 'undefined') {
            statusEl.innerText = "STATUS: READY";
            inputEl.disabled = false;
            btnEl.disabled = false;
            inputEl.placeholder = "Enter command...";
        } else {
            statusEl.innerText = "STATUS: LIB_LOAD_ERROR";
            statusEl.style.background = "red";
        }
    };

    function append(role, text) {
        const d = document.createElement('div');
        d.className = `bubble ${role}`;
        d.innerHTML = text;
        const cont = document.getElementById('chat-container');
        cont.appendChild(d);
        cont.scrollTop = cont.scrollHeight;
        return d;
    }

    async function sendMessage() {
        const val = inputEl.value.trim();
        if(!val) return;
        append('user', val);
        inputEl.value = '';

        if (!navigator.gpu) {
            append('ai', "❌ HARDWARE_ERROR: WebGPU niet gevonden. Schakel Energiebesparing uit of gebruik Safari.");
            return;
        }

        try {
            if(!engine) {
                statusEl.innerText = "STATUS: MOUNTING_MODEL...";
                engine = new webllm.MLCEngine();
                engine.setInitProgressCallback((r) => {
                    statusEl.innerText = `SYNCING: ${Math.round(r.progress * 100)}%`;
                });
                await engine.reload("SmolLM-135B-Instruct-v0.2-q4f16_1-MLC");
            }
            statusEl.innerText = "STATUS: THINKING...";
            const b = append('ai', '...');
            let full = "";
            const res = await engine.chat.completions.create({ messages: [{role:"user", content:val}], stream: true });
            for await (const chunk of res) {
                full += chunk.choices[0]?.delta?.content || "";
                b.innerText = full;
            }
            statusEl.innerText = "STATUS: READY";
        } catch (e) {
            append('ai', "❌ NEURAL_ERROR: " + e.message);
            statusEl.innerText = "STATUS: ERROR";
        }
    }
</script>
</body>
</html>
