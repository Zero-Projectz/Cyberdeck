<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberdeck AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js"></script>
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
    <style>
        :root { --bg-color: #050505; --chat-bg: #000000; --text-color: #00ff41; --accent-color: #00ff41; --user-bubble: #1a1a1a; --ai-bubble: #050505; --border-color: #262626; }
        body { font-family: 'Courier New', monospace; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #000; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: var(--chat-bg); }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 5px; font-size: 15px; border: 1px solid var(--border-color); word-wrap: break-word; }
        .user { align-self: flex-end; background-color: var(--user-bubble); color: #fff; }
        .ai { align-self: flex-start; background-color: var(--ai-bubble); border-left: 3px solid var(--accent-color); }
        .controls { padding: 10px; display: flex; gap: 10px; background: #111; border-bottom: 1px solid var(--border-color); }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid var(--border-color); padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        #user-input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid var(--border-color); background: #000; color: var(--text-color); font-size: 16px; }
        button { background: var(--accent-color); color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
<header>
    <strong>CYBERDECK_AI v1.0</strong>
    <div style="display:flex; gap:10px;">
        <button onclick="exportBackup()">💾</button>
        <button onclick="toggleSettings()">⚙️</button>
    </div>
</header>
<div id="settings" class="controls" style="display:none;">
    BG: <input type="color" onchange="updateColor('--bg-color', this.value)">
    TXT: <input type="color" onchange="updateColor('--text-color', this.value)">
    <button onclick="resetTheme()">RESET</button>
</div>
<div id="status" style="font-size: 9px; padding: 5px 20px; opacity: 0.7;">INITIALIZING_SYSTEM...</div>
<div id="chat-container"></div>
<div class="input-area">
    <input type="text" id="user-input" placeholder="Enter command...">
    <button onclick="sendMessage()">RUN</button>
</div>
<script>
    const soul = "Je bent Cyberdeck AI. Kort, krachtig, technisch.";
    let history = JSON.parse(localStorage.getItem('cd-chats')) || [{role:"system", content:soul}];
    let engine;

    window.onload = () => {
        const t = JSON.parse(localStorage.getItem('cd-theme')) || {};
        Object.keys(t).forEach(p => document.documentElement.style.setProperty(p, t[p]));
        render();
    };

    function updateColor(p, v) {
        document.documentElement.style.setProperty(p, v);
        const t = JSON.parse(localStorage.getItem('cd-theme')) || {};
        t[p] = v; localStorage.setItem('cd-theme', JSON.stringify(t));
    }

    function toggleSettings() { const s = document.getElementById('settings'); s.style.display = s.style.display === 'none' ? 'flex' : 'none'; }
    function resetTheme() { localStorage.removeItem('cd-theme'); location.reload(); }

    function render() {
        const cont = document.getElementById('chat-container'); cont.innerHTML = '';
        history.forEach(m => { if(m.role !== 'system') append(m.role, m.content, false); });
    }

    function append(role, text, save=true) {
        const d = document.createElement('div'); d.className = `bubble ${role}`; d.innerText = text;
        document.getElementById('chat-container').appendChild(d);
        document.getElementById('chat-container').scrollTop = 99999;
        if(save) { history.push({role, content: text}); localStorage.setItem('cd-chats', JSON.stringify(history)); }
        return d;
    }

    async function sendMessage() {
        const i = document.getElementById('user-input'); const val = i.value; if(!val) return;
        append('user', val); i.value = '';
        if(!engine) {
            document.getElementById('status').innerText = "LOADING_LOCAL_LLM_GPU...";
            engine = new webllm.MLCEngine();
            await engine.reload("SmolLM-135B-Instruct-v0.2-q4f16_1-MLC");
        }
        const b = append('ai', '...');
        const res = await engine.chat.completions.create({ messages: history, stream: true });
        let full = "";
        for await (const chunk of res) { full += chunk.choices[0]?.delta?.content || ""; b.innerText = full; }
        history.push({role: "assistant", content: full});
        localStorage.setItem('cd-chats', JSON.stringify(history));
        document.getElementById('status').innerText = "CORE_ONLINE";
    }

    function exportBackup() {
        const data = { history, theme: localStorage.getItem('cd-theme') };
        const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "cyberdeck.json"; a.click();
    }
</script>
</body>
</html>
