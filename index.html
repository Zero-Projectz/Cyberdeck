<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cyberdeck AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js"></script>
    <style>
        :root { --bg: #000; --green: #00ff41; --border: #262626; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; padding-top: env(safe-area-inset-top); }
        #settings-panel { display: none; background: #111; padding: 15px; border-bottom: 1px solid var(--green); font-size: 12px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 4px; max-width: 85%; font-size: 14px; border: 1px solid var(--border); }
        .ai { border-left: 3px solid var(--green); background: #050505; align-self: flex-start; }
        .user { background: #1a1a1a; color: #fff; align-self: flex-end; }
        .input-area { padding: 20px; background: #0a0a0a; border-top: 1px solid var(--border); display: flex; gap: 10px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        input { flex: 1; background: #000; border: 1px solid var(--green); color: var(--green); padding: 12px; border-radius: 4px; font-family: monospace; outline: none; }
        button { background: var(--green); color: #000; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .status-bar { font-size: 10px; padding: 5px 20px; background: #050505; border-bottom: 1px solid var(--border); opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <strong>CYBERDECK_v1.3</strong>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleSettings()" style="background:none; color:var(--green); border:1px solid var(--green);">⚙️</button>
        <button onclick="location.reload()" style="font-size:10px;">REBOOT</button>
    </div>
</header>

<div id="settings-panel">
    <strong>SYSTEM CONFIGURATION</strong><br><br>
    THEME_COLOR: <input type="color" onchange="updateTheme(this.value)" value="#00ff41" style="width:50px; height:20px; vertical-align:middle;"><br><br>
    BACKUP: <button onclick="exportData()" style="padding:5px;">DOWNLOAD_LOGS</button>
</div>

<div id="status" class="status-bar">STATUS: STANDBY // WEBGPU_CHECK...</div>

<div id="chat-container">
    <div class="bubble ai">SYSTEEM ONLINE. KLIK OP 'RUN' OM HET AI-MODEL TE LADEN BIJ JE EERSTE BERICHT.</div>
</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
    <button onclick="send()">RUN</button>
</div>

<script>
    let engine;
    let history = [{role: "system", content: "Je bent Cyberdeck AI. Kort en technisch."}];

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function updateTheme(color) {
        document.documentElement.style.setProperty('--green', color);
        document.getElementById('status').style.color = color;
    }

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        append('user', text);
        input.value = '';

        if(!engine) {
            document.getElementById('status').innerText = "STATUS: INITIALIZING_NEURAL_CORE (HEAVY_LOAD)...";
            try {
                engine = new webllm.MLCEngine();
                await engine.reload("SmolLM-135B-Instruct-v0.2-q4f16_1-MLC");
                document.getElementById('status').innerText = "STATUS: CORE_READY";
            } catch(e) {
                append('ai', "FOUT: Je apparaat ondersteunt WebGPU niet of de browser blokkeert het.");
                document.getElementById('status').innerText = "STATUS: HARDWARE_ERROR";
                return;
            }
        }

        document.getElementById('status').innerText = "STATUS: DECRYPTING_RESPONSE...";
        const aiBubble = append('ai', "...");
        
        const chunks = await engine.chat.completions.create({ 
            messages: [...history, {role: "user", content: text}], 
            stream: true 
        });

        let fullText = "";
        for await (const chunk of chunks) {
            fullText += chunk.choices[0]?.delta?.content || "";
            aiBubble.innerText = fullText;
            document.getElementById('chat-container').scrollTop = 99999;
        }
        history.push({role: "user", content: text}, {role: "assistant", content: fullText});
        document.getElementById('status').innerText = "STATUS: ONLINE";
    }

    function append(role, text) {
        const cont = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        cont.appendChild(div);
        cont.scrollTop = cont.scrollHeight;
        return div;
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(history)], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = "cyberdeck_logs.json"; a.click();
    }
</script>

</body>
</html>
