<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyberdeck AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js"></script>
    <style>
        :root { 
            --bg: #000000; 
            --green: #00ff41; 
            --dark-green: #003b00; 
            --gray: #1a1a1a; 
            --border: #262626; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background-color: var(--bg); 
            color: var(--green); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        header { 
            padding: 15px 20px; 
            background: #0a0a0a; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding-top: env(safe-area-inset-top);
        }
        #status { 
            font-size: 10px; 
            padding: 5px 20px; 
            background: #050505; 
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
        }
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .bubble { 
            max-width: 85%; 
            padding: 12px; 
            border-radius: 4px; 
            font-size: 14px; 
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user { 
            align-self: flex-end; 
            background: var(--gray); 
            color: #fff; 
            border: 1px solid var(--border);
        }
        .ai { 
            align-self: flex-start; 
            background: #050505; 
            border-left: 3px solid var(--green);
            padding-left: 15px;
        }
