<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cyberdeck</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat { flex: 1; overflow-y: auto; border: 1px solid #1a1a1a; padding: 10px; margin-bottom: 10px; }
        .input-wrap { display: flex; gap: 10px; padding-bottom: 30px; }
        input { flex: 1; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; font-size: 16px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div style="font-size: 12px; margin-bottom: 10px;">CYBERDECK v1.2 // STATUS: ONLINE</div>
    <div id="chat">Systeem geladen. Typ een bericht...</div>
    <div class="input-area">
        <div class="input-wrap">
            <input type="text" id="user-input" placeholder="Commando...">
            <button onclick="send()">RUN</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.46/dist/index.js"></script>
    <script>
        function send() {
            const i = document.getElementById('user-input');
            const c = document.getElementById('chat');
            if(!i.value) return;
            c.innerHTML += `<div style="color:#fff; margin-top:10px;">> ${i.value}</div>`;
            c.innerHTML += `<div style="color:#00ff41;">Bezig met verwerken... (AI start op)</div>`;
            i.value = '';
            // De AI logica volgt hier, maar dit laat iig de UI zien!
        }
    </script>
</body>
</html>
